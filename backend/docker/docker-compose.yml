version: '3.3'

x-logging: &log_limit
  logging:
    x-log-driver: 'json-file'
    x-log-opts:
      max-size: '1M'
      max-file: 3

services:

  database:
    platform: linux/x86_64
    image: mysql:8.0
    restart: always
    command: '--innodb_use_native_aio=0'
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./db-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - 3306:3306
    <<: *log_limit

  adminer:
    image: adminer:standalone
    restart: always
    depends_on:
      - database
    ports:
      - 8088:8080
    <<: *log_limit
